services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jalka
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
  api:
    build: ./backend
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/jalka
      JWT_SECRET: local-dev-secret-change-me
      CORS_ORIGIN: http://localhost:5173,http://localhost:8888,http://localhost:3000
    ports:
      - "3000:3000"
    depends_on:
      - db
volumes:
  pgdata:
